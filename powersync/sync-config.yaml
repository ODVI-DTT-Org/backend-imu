# PowerSync Sync Configuration for IMU
# Minimal configuration to get started

config:
  edition: 3

streams:
  # ============================================================
  # GLOBAL DATA - Sync to all users
  # ============================================================

  # PSGC (Philippine Standard Geographic Code) - for location picker
  psgc:
    auto_subscribe: true
    query: |
      SELECT id, region, province, mun_city, mun_city_kind, barangay, zip_code
      FROM psgc

  # Touchpoint Reasons - categorized reasons for touchpoints
  # Categories: e.g., "Follow-up", "Closing", "Information Gathering", etc.
  # Used to group touchpoint reasons by business purpose in the mobile app
  touchpoint_reasons:
    auto_subscribe: true
    query: |
      SELECT id, reason_code, label, touchpoint_type, role, category, sort_order, is_active
      FROM touchpoint_reasons
      WHERE is_active = true
