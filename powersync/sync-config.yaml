config:
  edition: 3

streams:
  user_profiles:
    auto_subscribe: true
    query: |
      SELECT id, user_id, name, email, role, avatar_url, updated_at
      FROM user_profiles
      WHERE user_id = auth.user_id()

  user_locations:
    auto_subscribe: true
    query: |
      SELECT id, user_id, province, municipality, assigned_at, assigned_by,
        deleted_at, created_at, updated_at
      FROM user_locations
      WHERE user_id = auth.user_id() AND deleted_at IS NULL

  client_favorites:
    auto_subscribe: true
    query: |
      SELECT id, user_id, client_id, created_at
      FROM client_favorites
      WHERE user_id = auth.user_id()

  visits:
    auto_subscribe: true
    query: |
      SELECT id, user_id, client_id, type, odometer_arrival,
        odometer_departure, photo_url, notes, reason, status,
        address, latitude, longitude, time_in, time_out,
        source, created_at, updated_at
      FROM visits
      WHERE user_id = auth.user_id()

  calls:
    auto_subscribe: true
    query: |
      SELECT id, client_id, user_id, phone_number, type,
        dial_time, duration, notes, reason, status,
        photo_url, source, created_at, updated_at
      FROM calls
      WHERE user_id = auth.user_id()

  touchpoints:
    auto_subscribe: true
    query: |
      SELECT id, client_id, user_id, touchpoint_number, type,
        date, status, next_visit_date, notes, rejection_reason,
        visit_id, call_id, is_legacy, created_at, updated_at
      FROM touchpoints
      WHERE user_id = auth.user_id()

  itineraries:
    auto_subscribe: true
    query: |
      SELECT id, user_id, client_id, scheduled_date, scheduled_time,
        status, priority, notes, created_by, created_at, updated_at
      FROM itineraries
      WHERE user_id = auth.user_id()

  groups:
    auto_subscribe: true
    query: |
      SELECT id, name, description, area_manager_id,
        assistant_area_manager_id, caravan_id, created_at
      FROM groups
      WHERE caravan_id = auth.user_id()

  targets:
    auto_subscribe: true
    query: |
      SELECT id, user_id, period, year, month, quarter, week,
        target_clients, target_touchpoints, target_visits, target_calls,
        created_at, updated_at, created_by
      FROM targets
      WHERE user_id = auth.user_id()

  attendance:
    auto_subscribe: true
    query: |
      SELECT id, user_id, date, time_in, time_out,
        location_in_lat, location_in_lng, location_out_lat, location_out_lng,
        notes, created_at
      FROM attendance
      WHERE user_id = auth.user_id()

  approvals:
    auto_subscribe: true
    query: |
      SELECT id, type, status, client_id, user_id, touchpoint_number,
        role, reason, notes, updated_client_information, updated_udi,
        udi_number, approved_by, approved_at, rejected_by, rejected_at,
        rejection_reason, created_at, updated_at
      FROM approvals
      WHERE user_id = auth.user_id()

  clients_territory:
    auto_subscribe: true
    query: |
      SELECT id, first_name, last_name, middle_name, birth_date,
        email, phone, agency_name, department, position,
        employment_status, payroll_date, tenure, client_type,
        product_type, market_type, pension_type, loan_type, pan,
        facebook_link, remarks, agency_id, psgc_id,
        region, province, municipality, barangay, udi,
        loan_released, loan_released_at, created_at, updated_at,
        created_by, deleted_at, deleted_by,
        touchpoint_summary, touchpoint_number, next_touchpoint
      FROM clients
      WHERE deleted_at IS NULL
        AND psgc_id IS NOT NULL
        AND psgc_id IN (
          SELECT id FROM psgc
          WHERE province IN (
            SELECT province FROM user_locations
            WHERE user_id = auth.user_id() AND deleted_at IS NULL
          )
          AND mun_city IN (
            SELECT municipality FROM user_locations
            WHERE user_id = auth.user_id() AND deleted_at IS NULL
          )
        )

  clients_favorited:
    auto_subscribe: true
    query: |
      SELECT id, first_name, last_name, middle_name, birth_date,
        email, phone, agency_name, department, position,
        employment_status, payroll_date, tenure, client_type,
        product_type, market_type, pension_type, loan_type, pan,
        facebook_link, remarks, agency_id, psgc_id,
        region, province, municipality, barangay, udi,
        loan_released, loan_released_at, created_at, updated_at,
        created_by, deleted_at, deleted_by,
        touchpoint_summary, touchpoint_number, next_touchpoint
      FROM clients
      WHERE deleted_at IS NULL
        AND id IN (
          SELECT client_id FROM client_favorites
          WHERE user_id = auth.user_id()
        )

  addresses_territory:
    auto_subscribe: true
    query: |
      SELECT id, client_id, type, street, barangay, city, province,
        postal_code, latitude, longitude, is_primary, psgc_id,
        street_address, created_at, updated_at, deleted_at
      FROM addresses
      WHERE deleted_at IS NULL
        AND client_id IN (
          SELECT id FROM clients
          WHERE deleted_at IS NULL
            AND psgc_id IS NOT NULL
            AND psgc_id IN (
              SELECT id FROM psgc
              WHERE province IN (
                SELECT province FROM user_locations
                WHERE user_id = auth.user_id() AND deleted_at IS NULL
              )
              AND mun_city IN (
                SELECT municipality FROM user_locations
                WHERE user_id = auth.user_id() AND deleted_at IS NULL
              )
            )
        )

  addresses_favorited:
    auto_subscribe: true
    query: |
      SELECT id, client_id, type, street, barangay, city, province,
        postal_code, latitude, longitude, is_primary, psgc_id,
        street_address, created_at, updated_at, deleted_at
      FROM addresses
      WHERE deleted_at IS NULL
        AND client_id IN (
          SELECT client_id FROM client_favorites
          WHERE user_id = auth.user_id()
        )

  phone_numbers_territory:
    auto_subscribe: true
    query: |
      SELECT id, client_id, number, label, is_primary,
        created_at, updated_at, deleted_at
      FROM phone_numbers
      WHERE deleted_at IS NULL
        AND client_id IN (
          SELECT id FROM clients
          WHERE deleted_at IS NULL
            AND psgc_id IS NOT NULL
            AND psgc_id IN (
              SELECT id FROM psgc
              WHERE province IN (
                SELECT province FROM user_locations
                WHERE user_id = auth.user_id() AND deleted_at IS NULL
              )
              AND mun_city IN (
                SELECT municipality FROM user_locations
                WHERE user_id = auth.user_id() AND deleted_at IS NULL
              )
            )
        )

  phone_numbers_favorited:
    auto_subscribe: true
    query: |
      SELECT id, client_id, number, label, is_primary,
        created_at, updated_at, deleted_at
      FROM phone_numbers
      WHERE deleted_at IS NULL
        AND client_id IN (
          SELECT client_id FROM client_favorites
          WHERE user_id = auth.user_id()
        )
