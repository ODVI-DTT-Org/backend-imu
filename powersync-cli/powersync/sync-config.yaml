# PowerSync Sync Configuration for IMU
# Edition 2: bucket_definitions

config:
  edition: 2

bucket_definitions:
  # ============================================================
  # USER DATA — one bucket per authenticated user
  # All user-specific tables + addresses + phone_numbers
  # (addresses and phone_numbers sync all non-deleted records)
  # ============================================================
  user_data:
    parameters: |
      SELECT token_parameters.user_id as user_id
    data:
      - |
        SELECT id, user_id, name, email, role, avatar_url, updated_at
        FROM user_profiles
        WHERE user_id = bucket.user_id
      - |
        SELECT id, user_id, province, municipality, assigned_at, assigned_by,
          deleted_at, created_at, updated_at
        FROM user_locations
        WHERE user_id = bucket.user_id AND deleted_at IS NULL
      - |
        SELECT id, client_id, user_id, type, odometer_arrival,
          odometer_departure, photo_url, notes, reason, status,
          address, latitude, longitude, time_in, time_out,
          source, created_at, updated_at
        FROM visits
        WHERE user_id = bucket.user_id
      - |
        SELECT id, client_id, user_id, phone_number, type,
          dial_time, duration, notes, reason, status,
          photo_url, source, created_at, updated_at
        FROM calls
        WHERE user_id = bucket.user_id
      - |
        SELECT id, client_id, user_id, touchpoint_number, type,
          date, status, next_visit_date, notes, rejection_reason,
          visit_id, call_id, is_legacy, created_at, updated_at
        FROM touchpoints
        WHERE user_id = bucket.user_id
      - |
        SELECT id, user_id, client_id, scheduled_date, scheduled_time,
          status, priority, notes, created_by, created_at, updated_at
        FROM itineraries
        WHERE user_id = bucket.user_id
      - |
        SELECT id, name, description, area_manager_id,
          assistant_area_manager_id, caravan_id, created_at
        FROM groups
        WHERE caravan_id = bucket.user_id
      - |
        SELECT id, user_id, period, year, month, quarter, week,
          target_clients, target_touchpoints, target_visits, target_calls,
          created_at, updated_at, created_by
        FROM targets
        WHERE user_id = bucket.user_id
      - |
        SELECT id, user_id, date, time_in, time_out,
          location_in_lat, location_in_lng, location_out_lat, location_out_lng,
          notes, created_at
        FROM attendance
        WHERE user_id = bucket.user_id
      - |
        SELECT id, type, status, client_id, user_id, touchpoint_number,
          role, reason, notes, updated_client_information, updated_udi,
          udi_number, approved_by, approved_at, rejected_by, rejected_at,
          rejection_reason, created_at, updated_at
        FROM approvals
        WHERE user_id = bucket.user_id


